<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Hawk-Eye LBW Analyzer v2</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: white; }
        .container { width: 90%; max-width: 900px; margin: 40px auto; text-align: center; }
        .card { background: #1e293b; padding: 25px; border-radius: 16px; margin-top: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        input, select { padding: 12px 16px; margin: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        .loading-text { color: #f59e0b; font-size: 16px; display: none; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .video-box { position: relative; display: inline-block; width: 100%; max-width: 750px; margin-top: 25px; border-radius: 12px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .result { display: none; background: #020617; padding: 25px; border-radius: 16px; margin-top: 20px; border: 1px solid #1e293b; }
        .out { color: #22c55e; font-size: 32px; font-weight: 800; tracking: 1px; }
        .notout { color: #ef4444; font-size: 32px; font-weight: 800; tracking: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏏 AI Hawk-Eye LBW Analyzer <span style="font-size:14px; color:#38bdf8;">YOLOv8 + Kalman Core</span></h1>

    <div class="card">
        <input type="file" id="videoInput" accept="video/*">
        <select id="hand">
            <option value="Right">Right Hand Batsman</option>
            <option value="Left">Left Hand Batsman</option>
        </select>
        <div id="loadingStatus" class="loading-text">🔄 ByteTrack Processing & Kalman Filtering Active... Please Wait...</div>
    </div>

    <div class="card result" id="result">
        <h2>Hawk-Eye Decision</h2>
        <div id="decision"></div>
        <div style="display: flex; justify-content: space-around; margin-top: 20px; border-top: 1px solid #1e293b; padding-top: 15px;">
            <p id="pitching"></p>
            <p id="impact"></p>
            <p id="wicket"></p>
        </div>
    </div>

    <div class="video-box">
        <video id="video" controls preload="auto" playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    document.getElementById("videoInput").addEventListener("change", function() {
        if(this.files.length > 0) {
            analyzeVideo(this.files[0]);
        }
    });

    async function analyzeVideo(file) {
        let loadingStatus = document.getElementById("loadingStatus");
        loadingStatus.style.display = "block";
        document.getElementById("result").style.display = "none";
        
        let form = new FormData();
        form.append("video", file);

        try {
            let response = await fetch("/analyze", { method: "POST", body: form });
            let data = await response.json();
            loadingStatus.style.display = "none";

            if (!data.success || data.ball_points.length === 0) {
                alert("YOLO Model Diagnostics: No points returned. Please try a cleaner clip or switch to a custom cricket weight file (best.pt).");
                return;
            }

            let video = document.getElementById("video");
            // Cache busting logic string injection to prevent Render render freezes
            video.src = data.video + "?t=" + new Date().getTime();

            let result = data.analysis;
            document.getElementById("result").style.display = "block";

            let decision = document.getElementById("decision");
            decision.innerHTML = result.decision;
            decision.className = (result.decision == "OUT") ? "out" : "notout";

            document.getElementById("pitching").innerHTML = "<b>Pitching:</b><br>" + result.pitching;
            document.getElementById("impact").innerHTML = "<b>Impact:</b><br>" + result.impact;
            document.getElementById("wicket").innerHTML = "<b>Wickets:</b><br>" + result.wicket;

            video.onloadedmetadata = function() {
                drawTrajectory(data.ball_points, video);
            };
        } catch (error) {
            loadingStatus.style.display = "none";
            alert("Render instance took too long to complete the track cycle.");
        }
    }

    function drawTrajectory(points, video) {
        let canvas = document.getElementById("canvas");
        let ctx = canvas.getContext("2d");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if(points.length < 2) return;

        // Draw Professional Neon Blue Tracking Line
        ctx.lineWidth = 4;
        ctx.strokeStyle = "#38bdf8"; 
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.shadowBlur = 8;
        ctx.shadowColor = "#38bdf8";
        ctx.beginPath();

        points.forEach((p, index) => {
            if (index === 0) {
                ctx.moveTo(p.x, p.y);
            } else {
                ctx.lineTo(p.x, p.y);
            }
        });
        ctx.stroke();

        // Reset shadows for dots to maintain performance bounds
        ctx.shadowBlur = 0;

        // Draw solid tracked points
        points.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = "#f43f5e"; 
            ctx.fill();
        });
    }
</script>

</body>
</html>
