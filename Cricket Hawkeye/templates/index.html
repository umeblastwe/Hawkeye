<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Telemetry Tracking Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #070b12; font-family: system-ui, -apple-system, sans-serif; }
        .hud-text { font-family: 'Arial Black', Impact, sans-serif; font-weight: 900; }
        .pink-glow { filter: drop-shadow(0px 0px 8px #f43f5e); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-white">

    <div class="w-full max-w-5xl bg-slate-900/40 border border-slate-800 p-6 rounded-2xl shadow-2xl backdrop-blur-md">
        
        <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden border border-slate-950 shadow-2xl mb-6">
            <video id="mainVideoPlayer" class="w-full h-full object-cover" muted playsinline></video>
            
            <canvas id="trackingCanvas" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>

            <div id="hawkEyeHUD" class="absolute left-8 bottom-8 flex flex-col gap-2 transition-all duration-500 transform translate-x-[-300px] opacity-0">
                <div class="flex items-center w-44 h-7 text-[11px] font-bold tracking-wider shadow-lg">
                    <div class="bg-sky-800 text-slate-100 px-3 flex items-center h-full w-1/2 uppercase">Wickets</div>
                    <div class="bg-red-600 text-center flex items-center justify-center h-full text-white w-1/2 hud-text tracking-normal">HITTING</div>
                </div>
                <div class="flex items-center w-44 h-7 text-[11px] font-bold tracking-wider shadow-lg">
                    <div class="bg-sky-800 text-slate-100 px-3 flex items-center h-full w-1/2 uppercase">Impact</div>
                    <div class="bg-red-600 text-center flex items-center justify-center h-full text-white w-1/2 hud-text tracking-normal">IN-LINE</div>
                </div>
                <div class="flex items-center w-44 h-7 text-[11px] font-bold tracking-wider shadow-lg">
                    <div class="bg-sky-800 text-slate-100 px-3 flex items-center h-full w-1/2 uppercase">Pitching</div>
                    <div class="bg-emerald-600 text-center flex items-center justify-center h-full text-white w-1/2 hud-text tracking-normal">OUTSIDE OFF</div>
                </div>
            </div>

            <div id="decisionBanner" class="absolute left-8 top-8 flex flex-col w-40 transition-all duration-500 transform translate-y-[-120px] opacity-0 shadow-xl">
                <div class="bg-sky-800 text-[9px] font-bold text-center py-0.5 tracking-widest text-slate-200">ORIGINAL DECISION</div>
                <div class="bg-emerald-600 text-sm font-black text-center py-1 text-white hud-text">NOT OUT</div>
            </div>
        </div>

        <div class="bg-slate-950/80 p-4 border border-slate-800 rounded-xl flex flex-col sm:flex-row gap-4 items-center justify-between">
            <form id="visionControlForm" class="w-full flex flex-col sm:flex-row gap-4 items-center">
                <div class="w-full sm:w-auto flex-1">
                    <input type="file" id="videoAsset" name="video" accept="video/*" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-sky-600 file:text-white hover:file:bg-sky-500 cursor-pointer" required>
                </div>
                
                <div class="w-full sm:w-48">
                    <select name="batsman_hand" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-sky-500">
                        <option value="Right">Right Hand Batsman</option>
                        <option value="Left">Left Hand Batsman</option>
                    </select>
                </div>

                <button type="submit" id="submitActionBtn" class="w-full sm:w-auto bg-sky-600 hover:bg-sky-500 font-bold text-xs px-6 py-2.5 rounded transition shadow-lg shadow-sky-600/10 whitespace-nowrap">
                    Analyze & Project Tracking
                </button>
            </form>
        </div>
    </div>

    <script>
        const video = document.getElementById('mainVideoPlayer');
        const canvas = document.getElementById('trackingCanvas');
        const ctx = canvas.getContext('2d');
        
        let traceProgress = 0;
        let isAnimationRunning = false;
        let trackingCoordinates = [];

        function setCanvasDimensions() {
            canvas.width = video.clientWidth;
            canvas.height = video.clientHeight;
        }
        window.addEventListener('resize', setCanvasDimensions);

        document.getElementById('visionControlForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            setCanvasDimensions();
            
            // Clean up state fields
            isAnimationRunning = false;
            traceProgress = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            animateHUDWidgets(false);

            const formData = new FormData(e.target);
            const btn = document.getElementById('submitActionBtn');
            btn.textContent = "OpenCV Processing Frames...";
            btn.disabled = true;

            try {
                const response = await fetch('/analyze', { method: 'POST', body: formData });
                const result = await response.json();

                if (result.success) {
                    trackingCoordinates = result.points;
                    video.src = result.video_url;
                    video.load();
                    video.play();

                    // Hook directly into the precise frame synchronization sequence loop
                    video.addEventListener('timeupdate', function playbackFreezeHook() {
                        if (video.currentTime >= result.impact_time && !isAnimationRunning) {
                            video.pause();
                            isAnimationRunning = true;
                            animateHUDWidgets(true);
                            renderDynamicTrajectoryLine();
                            video.removeEventListener('timeupdate', playbackFreezeHook);
                        }
                    });
                }
            } catch (err) {
                console.error("Communication failure:", err);
            } finally {
                btn.textContent = "Analyze & Project Tracking";
                btn.disabled = false;
            }
        });

        // Loop execution engine to draw exact line projection curves over the canvas layout
        function renderDynamicTrajectoryLine() {
            if (traceProgress < 1) {
                traceProgress += 0.025; // Continuous vector drawing scale rate
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Default viewport alignments calibrated for standard tracking angles
                let startPixelX = canvas.width * 0.56;
                let startPixelY = canvas.height * 0.72;
                let impactPixelX = canvas.width * 0.52;
                let impactPixelY = canvas.height * 0.54;

                // Map exact pixel arrays provided from backend computer vision logs if existing
                if (trackingCoordinates.length > 4) {
                    const ratioX = canvas.width / video.videoWidth;
                    const ratioY = canvas.height / video.videoHeight;

                    startPixelX = trackingCoordinates[0].x * ratioX;
                    startPixelY = trackingCoordinates[0].y * ratioY;
                    impactPixelX = trackingCoordinates[Math.floor(trackingCoordinates.length / 2)].x * ratioX;
                    impactPixelY = trackingCoordinates[Math.floor(trackingCoordinates.length / 2)].y * ratioY;
                }

                // Target center coordinates corresponding directly to the wicket heights
                const targetWicketsX = canvas.width * 0.49;
                const targetWicketsY = canvas.height * 0.42;

                // Render Step A: Historical tracked path down the pitch lane
                ctx.beginPath();
                ctx.moveTo(startPixelX, startPixelY);
                ctx.lineTo(impactPixelX, impactPixelY);
                ctx.strokeStyle = '#ec4899'; // Bright magenta-pink solid color broadcast style
                ctx.lineWidth = 4;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ec4899';
                ctx.stroke();

                // Render Step B: Projected predictive tracking dot path
                ctx.beginPath();
                ctx.moveTo(impactPixelX, impactPixelY);
                
                const frameCurrentX = impactPixelX + (targetWicketsX - impactPixelX) * traceProgress;
                const frameCurrentY = impactPixelY + (targetWicketsY - impactPixelY) * traceProgress;
                
                ctx.lineTo(frameCurrentX, frameCurrentY);
                ctx.strokeStyle = '#ec4899';
                ctx.lineWidth = 4;
                ctx.setLineDash([5, 4]); // Dotted overlay trace array configuration
                ctx.stroke();
                ctx.setLineDash([]); // Reset structure

                // Predictive halo ball element node tracking ring
                ctx.beginPath();
                ctx.arc(frameCurrentX, frameCurrentY, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                requestAnimationFrame(renderDynamicTrajectoryLine);
            }
        }

        function animateHUDWidgets(show) {
            const hud = document.getElementById('hawkEyeHUD');
            const banner = document.getElementById('decisionBanner');
            if (show) {
                hud.classList.remove('translate-x-[-300px]', 'opacity-0');
                banner.classList.remove('translate-y-[-120px]', 'opacity-0');
            } else {
                hud.classList.add('translate-x-[-300px]', 'opacity-0');
                banner.classList.add('translate-y-[-120px]', 'opacity-0');
            }
        }
    </script>
</body>
</html>
