<script>
        const video = document.getElementById('videoPlayer');
        const canvas = document.getElementById('hawkEyeCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        let isProjecting = false;
        let projectionProgress = 0;

        // Sync canvas size with video resolution
        function resizeCanvas() {
            canvas.width = video.clientWidth;
            canvas.height = video.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        // --- UPDATED SUBMIT EVENT LISTENER WITH OPENCV SYNC ---
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            resizeCanvas();
            
            // Clear states
            isProjecting = false;
            projectionProgress = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hideHUD();

            const formData = new FormData(e.target);
            
            // UI state indicator
            const submitBtn = e.target.querySelector('button');
            submitBtn.textContent = "OpenCV Computing Trajectory Matrix...";
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if(data.success) {
                    // Load and parse properties returned via OpenCV calculations
                    video.src = data.video_url;
                    video.load();
                    video.play();
                    
                    // Sync dynamic overlay data parameters
                    document.getElementById('hudPitching').textContent = data.telemetry.pitching;
                    document.getElementById('hudImpact').textContent = data.telemetry.impact;
                    document.getElementById('hudWickets').textContent = data.telemetry.wickets;
                    document.getElementById('hudCallText').textContent = data.telemetry.on_field_call;

                    setHUDColor('hudPitching', data.telemetry.pitching);
                    setHUDColor('hudImpact', data.telemetry.impact);
                    setHUDColor('hudWickets', data.telemetry.wickets);
                    setHUDColor('hudCallText', data.telemetry.on_field_call.toUpperCase());

                    // Listen to exact OpenCV dynamic timeline frame pause point
                    video.addEventListener('timeupdate', function currentFrameHandler() {
                        if (video.currentTime >= data.impact_time && !isProjecting) {
                            video.pause();
                            isProjecting = true;
                            showHUD();
                            animateHawkEyeLine();
                            // Remove listener to prevent collision loops
                            video.removeEventListener('timeupdate', currentFrameHandler);
                        }
                    });
                } else {
                    alert("Analysis failed: " + data.error);
                }
            } catch (error) {
                console.error("Tracking system failure:", error);
                alert("Something went wrong with the OpenCV telemetry fetch.");
            } finally {
                submitBtn.textContent = "Render HawkEye Tracking";
                submitBtn.disabled = false;
            }
        });

        // --- HAWKEYE VECTOR GRAPHICS ANIMATION ENGINE ---
        function animateHawkEyeLine() {
            if (projectionProgress < 1) {
                projectionProgress += 0.02; // Line speed framework
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Coordinates adjusted relative to general camera pitch angle
                const startX = canvas.width * 0.58;
                const startY = canvas.height * 0.75;
                const impactX = canvas.width * 0.52;
                const impactY = canvas.height * 0.55;

                let targetX = canvas.width * 0.49; 
                let targetY = canvas.height * 0.42;

                // Dynamic routing logic if trajectory calculation determines a MISSING path
                if (document.getElementById('hudWickets').textContent === 'MISSING') {
                    targetX = canvas.width * 0.43; 
                }

                // Leg 1: Pitch to Pad Impact
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(impactX, impactY);
                ctx.strokeStyle = '#e11d48'; 
                ctx.lineWidth = 4;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#f43f5e';
                ctx.stroke();

                // Leg 2: Projected Path Prediction (Dotted Line)
                ctx.beginPath();
                ctx.moveTo(impactX, impactY);
                
                const currentX = impactX + (targetX - impactX) * projectionProgress;
                const currentY = impactY + (targetY - impactY) * projectionProgress;
                
                ctx.lineTo(currentX, currentY);
                ctx.strokeStyle = '#f43f5e';
                ctx.lineWidth = 4;
                ctx.setLineDash([4, 4]); 
                ctx.stroke();
                ctx.setLineDash([]); // Reset

                // Glow Ring Target Pulse Marker
                ctx.beginPath();
                ctx.arc(currentX, currentY, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                animationFrameId = requestAnimationFrame(animateHawkEyeLine);
            }
        }

        function showHUD() {
            document.getElementById('hudWidgets').classList.remove('translate-x-[-200px]', 'opacity-0');
            document.getElementById('hudOriginalCall').classList.remove('translate-y-[-100px]', 'opacity-0');
        }

        function hideHUD() {
            document.getElementById('hudWidgets').classList.add('translate-x-[-200px]', 'opacity-0');
            document.getElementById('hudOriginalCall').classList.add('translate-y-[-100px]', 'opacity-0');
        }

        function setHUDColor(id, value) {
            const el = document.getElementById(id);
            if (['IN-LINE', 'HITTING', 'OUT'].includes(value)) {
                el.className = "bg-red-600 text-xs px-2 py-1 h-7 flex items-center justify-center font-black text-white w-1/2 text-center hud-banner";
            } else {
                el.className = "bg-emerald-600 text-xs px-2 py-1 h-7 flex items-center justify-center font-black text-white w-1/2 text-center hud-banner";
            }
        }
    </script>
