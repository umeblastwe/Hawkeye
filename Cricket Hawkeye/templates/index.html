<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HawkEye Broadcast System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05080f; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .broadcast-font { font-family: 'Arial Black', Impact, sans-serif; font-weight: 900; letter-spacing: 0.5px; }
        /* Exact color match from the video overlay screens */
        .sky-header { background-color: #0ea5e9; }
        .glow-pink-line { filter: drop-shadow(0px 0px 6px rgba(236, 72, 153, 0.9)); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-white">

    <div class="w-full max-w-5xl bg-slate-900/30 border border-slate-800 p-6 rounded-2xl shadow-2xl backdrop-blur-md">
        
        <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border border-slate-950 mb-6">
            <video id="videoSystem" class="w-full h-full object-cover" muted playsinline></video>
            <canvas id="canvasLayer" class="absolute inset-0 w-full h-full pointer-events-none glow-pink-line"></canvas>

            <div id="leftBroadcastHUD" class="absolute left-8 bottom-12 flex flex-col gap-2 transition-all duration-500 transform translate-x-[-320px] opacity-0">
                <div class="flex items-center w-52 h-8 shadow-2xl">
                    <div class="bg-cyan-600 text-slate-100 text-[11px] px-3 flex items-center font-bold tracking-wider h-full w-1/2 uppercase">Wickets</div>
                    <div id="hudWickets" class="text-center flex items-center justify-center text-xs h-full text-white w-1/2 broadcast-font">HITTING</div>
                </div>
                <div class="flex items-center w-52 h-8 shadow-2xl">
                    <div class="bg-cyan-600 text-slate-100 text-[11px] px-3 flex items-center font-bold tracking-wider h-full w-1/2 uppercase">Impact</div>
                    <div id="hudImpact" class="text-center flex items-center justify-center text-xs h-full text-white w-1/2 broadcast-font">IN-LINE</div>
                </div>
                <div class="flex items-center w-52 h-8 shadow-2xl">
                    <div class="bg-cyan-600 text-slate-100 text-[11px] px-3 flex items-center font-bold tracking-wider h-full w-1/2 uppercase">Pitching</div>
                    <div id="hudPitching" class="text-center flex items-center justify-center text-xs h-full text-white w-1/2 broadcast-font">IN-LINE</div>
                </div>
            </div>

            <div id="topDecisionCard" class="absolute left-8 top-8 flex flex-col w-44 transition-all duration-500 transform translate-y-[-120px] opacity-0 shadow-2xl">
                <div class="bg-cyan-600 text-[9px] font-bold text-center py-0.5 tracking-widest text-slate-100">ORIGINAL DECISION</div>
                <div id="hudVerdict" class="text-sm font-black text-center py-1 text-white broadcast-font">NOT OUT</div>
            </div>
        </div>

        <div class="bg-slate-950/90 border border-slate-800 p-4 rounded-xl flex flex-col sm:flex-row items-center justify-between gap-4">
            <form id="trackingForm" class="w-full flex flex-col sm:flex-row gap-4 items-center justify-between">
                <input type="file" name="video" accept="video/*" class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-cyan-600 file:text-white hover:file:bg-cyan-500 cursor-pointer" required>
                <button type="submit" id="actionBtn" class="bg-cyan-600 hover:bg-cyan-500 font-bold text-xs px-6 py-2.5 rounded transition tracking-wide whitespace-nowrap shadow-md">
                    Analyze Ball Trajectory
                </button>
            </form>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoSystem');
        const canvas = document.getElementById('canvasLayer');
        const ctx = canvas.getContext('2d');
        
        let pathProgress = 0;
        let runningState = false;
        let calculatedX = 0.5;
        let calculatedY = 0.44;

        function resizeTrackingLayer() {
            canvas.width = video.clientWidth;
            canvas.height = video.clientHeight;
        }
        window.addEventListener('resize', resizeTrackingLayer);

        document.getElementById('trackingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            resizeTrackingLayer();
            
            runningState = false;
            pathProgress = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            animateHUD(false);

            const formData = new FormData(e.target);
            const actionBtn = document.getElementById('actionBtn');
            actionBtn.textContent = "Processing OpenCV Vectors...";
            actionBtn.disabled = true;

            try {
                const response = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.success) {
                    calculatedX = data.target_x;
                    calculatedY = data.target_y;

                    // Load variables directly onto UI blocks
                    document.getElementById('hudWickets').textContent = data.telemetry.wickets;
                    document.getElementById('hudImpact').textContent = data.telemetry.impact;
                    document.getElementById('hudPitching').textContent = data.telemetry.pitching;
                    document.getElementById('hudVerdict').textContent = data.telemetry.verdict;

                    // Process dynamic video-matched design color variations
                    applyUIVisualColors(data.telemetry.wickets, data.telemetry.verdict);

                    video.src = data.video_url;
                    video.load();
                    video.play();

                    video.addEventListener('timeupdate', function playheadHook() {
                        if (video.currentTime >= data.impact_time && !runningState) {
                            video.pause();
                            runningState = true;
                            animateHUD(true);
                            executeHawkEyeAnimation();
                            video.removeEventListener('timeupdate', playheadHook);
                        }
                    });
                }
            } catch (error) {
                print("Processing failure on standard pipelines.");
            } finally {
                actionBtn.textContent = "Analyze Ball Trajectory";
                actionBtn.disabled = false;
            }
        });

        // Loop method to draw natural parabolic delivery lines exactly like international streams
        function executeHawkEyeAnimation() {
            if (pathProgress < 1) {
                pathProgress += 0.02; // Linear animation processing intervals
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Setup screen anchors
                const startX = canvas.width * 0.56;
                const startY = canvas.height * 0.72;
                
                // Using curve coordinates to make the pink tracking look realistic
                const controlX = canvas.width * 0.54;
                const controlY = canvas.height * 0.60;
                
                const impactX = canvas.width * 0.52;
                const impactY = canvas.height * 0.54;

                const targetStumpsX = canvas.width * calculatedX;
                const targetStumpsY = canvas.height * calculatedY;

                // 1. Drawing the historical flight path (Parabolic Bezier Curve)
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.quadraticCurveTo(controlX, controlY, impactX, impactY);
                ctx.strokeStyle = '#ec4899'; // Bright Magenta-Pink line matching the video exactly
                ctx.lineWidth = 4;
                ctx.stroke();

                // 2. Drawing the predictive forward trajectory extension (Dotted Tracking Line)
                ctx.beginPath();
                ctx.moveTo(impactX, impactY);
                
                const currentTraceLineX = impactX + (targetStumpsX - impactX) * pathProgress;
                const currentTraceLineY = impactY + (targetStumpsY - impactY) * pathProgress;
                
                ctx.lineTo(currentTraceLineX, currentTraceLineY);
                ctx.strokeStyle = '#ec4899';
                ctx.lineWidth = 4;
                ctx.setLineDash([5, 4]); // Dynamic dashed pattern spacing
                ctx.stroke();
                ctx.setLineDash([]); // Reset buffer arrays

                // Ball pulse head marker element
                ctx.beginPath();
                ctx.arc(currentTraceLineX, currentTraceLineY, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                requestAnimationFrame(executeHawkEyeAnimation);
            }
        }

        function animateHUD(visible) {
            const hud = document.getElementById('leftBroadcastHUD');
            const card = document.getElementById('topDecisionCard');
            if (visible) {
                hud.classList.remove('translate-x-[-320px]', 'opacity-0');
                card.classList.remove('translate-y-[-120px]', 'opacity-0');
            } else {
                hud.classList.add('translate-x-[-320px]', 'opacity-0');
                card.classList.add('translate-y-[-120px]', 'opacity-0');
            }
        }

        function applyUIVisualColors(wickets, verdict) {
            const wElement = document.getElementById('hudWickets');
            const vElement = document.getElementById('hudVerdict');

            // Handle Wickets HUD Block Colors
            if (wickets === "MISSING") {
                wElement.className = "bg-emerald-600 text-center flex items-center justify-center text-xs h-full text-white w-1/2 broadcast-font";
            } else if (wickets === "UMPIRE'S CALL") {
                wElement.className = "bg-amber-500 text-center flex items-center justify-center text-xs h-full text-black w-1/2 broadcast-font";
            } else {
                wElement.className = "bg-red-600 text-center flex items-center justify-center text-xs h-full text-white w-1/2 broadcast-font";
            }

            // Handle Top Verdict Card Colors
            if (verdict === "NOT OUT") {
                vElement.className = "bg-emerald-600 text-sm font-black text-center py-1 text-white broadcast-font";
            } else if (verdict === "UMPIRE'S CALL") {
                vElement.className = "bg-amber-500 text-sm font-black text-center py-1 text-black broadcast-font";
            } else {
                vElement.className = "bg-red-600 text-sm font-black text-center py-1 text-white broadcast-font";
            }
        }
    </script>
</body>
</html>
