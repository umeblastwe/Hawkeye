<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HawkEye Vision Tracking Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b111e; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hud-block { font-family: 'Arial Black', sans-serif; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-5xl glass rounded-2xl p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
            <div class="flex items-center gap-3">
                <div class="h-3 w-3 rounded-full bg-red-500 animate-ping"></div>
                <h1 class="text-lg font-bold tracking-widest text-slate-300">HAWKEYE TELEMETRY SYSTEM</h1>
            </div>
            <div id="statusTag" class="text-xs font-mono px-3 py-1 bg-blue-500/10 text-blue-400 rounded border border-blue-500/20">AWAITING VIDEO STREAM</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 relative bg-black rounded-xl overflow-hidden aspect-video border border-slate-900 shadow-inner">
                <video id="videoPlayer" class="w-full h-full object-cover" muted playsinline></video>
                <canvas id="hawkEyeCanvas" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>

                <div id="broadcastHUD" class="absolute left-6 bottom-6 flex flex-col gap-1.5 opacity-0 transition-opacity duration-300">
                    <div class="flex items-center w-40 h-6 text-[10px] font-bold shadow-md">
                        <div class="bg-cyan-700 px-2 flex items-center h-full text-white w-1/2 uppercase">Wickets</div>
                        <div class="bg-red-600 text-center flex items-center justify-center h-full text-white w-1/2 hud-block">HITTING</div>
                    </div>
                    <div class="flex items-center w-40 h-6 text-[10px] font-bold shadow-md">
                        <div class="bg-cyan-700 px-2 flex items-center h-full text-white w-1/2 uppercase">Impact</div>
                        <div class="bg-red-600 text-center flex items-center justify-center h-full text-white w-1/2 hud-block">IN-LINE</div>
                    </div>
                    <div class="flex items-center w-40 h-6 text-[10px] font-bold shadow-md">
                        <div class="bg-cyan-700 px-2 flex items-center h-full text-white w-1/2 uppercase">Pitching</div>
                        <div class="bg-red-600 text-center flex items-center justify-center h-full text-white w-1/2 hud-block">IN-LINE</div>
                    </div>
                </div>

                <div id="decisionHUD" class="absolute left-6 top-6 flex flex-col w-36 opacity-0 transition-opacity duration-300 shadow-lg">
                    <div class="bg-cyan-700 text-[8px] font-bold text-white text-center py-0.5 tracking-wider">PROJECTED VERDICT</div>
                    <div class="bg-red-600 text-xs font-black text-center py-0.5 text-white hud-block">OUT</div>
                </div>
            </div>

            <div class="bg-slate-950/80 p-4 rounded-xl border border-slate-900 flex flex-col justify-between">
                <form id="automationForm" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">1. Upload Footage</label>
                        <input type="file" id="videoFileInput" name="video" accept="video/*" class="w-full text-xs bg-slate-900 border border-slate-800 rounded p-2 text-slate-400" required>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">2. Batsman Configuration</label>
                        <select name="batsman_hand" class="w-full bg-slate-900 text-xs border border-slate-800 rounded p-2 text-slate-200 font-medium focus:outline-none focus:border-cyan-600">
                            <option value="Right">Right Hand Batsman (RHB)</option>
                            <option value="Left">Left Hand Batsman (LHB)</option>
                        </select>
                    </div>

                    <button type="submit" id="processBtn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold text-xs py-2.5 rounded transition shadow-md shadow-cyan-600/10">
                        Run Computer Vision Engine
                    </button>
                </form>

                <div class="bg-slate-900/50 rounded border border-slate-800 p-2.5 text-[10px] font-mono text-slate-500 leading-relaxed">
                    System isolates the ball path. Trajectory calculation triggers automatically at the point of ball deceleration.
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const canvas = document.getElementById('hawkEyeCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        let isTrackingActive = false;
        let lineProgress = 0;
        let processedPoints = [];

        function syncCanvasSize() {
            canvas.width = video.clientWidth;
            canvas.height = video.clientHeight;
        }
        window.addEventListener('resize', syncCanvasSize);

        document.getElementById('automationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            syncCanvasSize();
            
            // Clear rendering space
            isTrackingActive = false;
            lineProgress = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            toggleHUDVisibility(false);

            const formData = new FormData(e.target);
            const processBtn = document.getElementById('processBtn');
            const statusTag = document.getElementById('statusTag');
            
            processBtn.textContent = "Processing OpenCV Vectors...";
            processBtn.disabled = true;
            statusTag.textContent = "COMPUTING PIXEL COUNTS";

            try {
                const res = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await res.json();

                if(data.success) {
                    processedPoints = data.points;
                    video.src = data.video_url;
                    video.load();
                    video.play();
                    statusTag.textContent = "RENDERED TRAJECTORY FRAMEWAY";

                    // Sync time handler trigger points dynamically based on backend calculations
                    video.addEventListener('timeupdate', function playheadTrackingHook() {
                        if (video.currentTime >= data.impact_time && !isTrackingActive) {
                            video.pause();
                            isTrackingActive = true;
                            toggleHUDVisibility(true);
                            executeVectorProjection();
                            video.removeEventListener('timeupdate', playheadTrackingHook);
                        }
                    });
                }
            } catch (err) {
                console.error(err);
                statusTag.textContent = "PIXEL EXCEPTION ERROR";
            } finally {
                processBtn.textContent = "Run Computer Vision Engine";
                processBtn.disabled = false;
            }
        });

        function executeVectorProjection() {
            if (lineProgress < 1) {
                lineProgress += 0.03; // Vector generation rate loops
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Default fallbacks calibrated for umpire camera views
                let baseStartX = canvas.width * 0.55;
                let baseStartY = canvas.height * 0.70;
                let baseImpactX = canvas.width * 0.51;
                let baseImpactY = canvas.height * 0.54;

                // Map data positions directly from OpenCV array streams if calculated successfully
                if (processedPoints.length > 5) {
                    const firstPt = processedPoints[0];
                    const middlePt = processedPoints[Math.floor(processedPoints.length / 2)];
                    
                    // Scale ratios
                    const scaleX = canvas.width / video.videoWidth;
                    const scaleY = canvas.height / video.videoHeight;

                    baseStartX = firstPt.x * scaleX;
                    baseStartY = firstPt.y * scaleY;
                    baseImpactX = middlePt.x * scaleX;
                    baseImpactY = middlePt.y * scaleY;
                }

                const targetStumpsX = canvas.width * 0.49;
                const targetStumpsY = canvas.height * 0.43;

                // Path Segment A: Real tracked timeline coordinates
                ctx.beginPath();
                ctx.moveTo(baseStartX, baseStartY);
                ctx.lineTo(baseImpactX, baseImpactY);
                ctx.strokeStyle = '#ec4899'; // Pure International Broadcast Magenta Pink Line
                ctx.lineWidth = 4;
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#f43f5e';
                ctx.stroke();

                // Path Segment B: Linear predictive regression trace overlay
                ctx.beginPath();
                ctx.moveTo(baseImpactX, baseImpactY);
                
                const currentTraceX = baseImpactX + (targetStumpsX - baseImpactX) * lineProgress;
                const currentTraceY = baseImpactY + (targetStumpsY - baseImpactY) * lineProgress;
                
                ctx.lineTo(currentTraceX, currentTraceY);
                ctx.strokeStyle = '#ec4899';
                ctx.lineWidth = 4;
                ctx.setLineDash([4, 4]); // Dotted trajectory trace pattern
                ctx.stroke();
                ctx.setLineDash([]);

                // Target Tracker Halo Point Element
                ctx.beginPath();
                ctx.arc(currentTraceX, currentTraceY, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                animationFrameId = requestAnimationFrame(executeVectorProjection);
            }
        }

        function toggleHUDVisibility(visible) {
            const opacity = visible ? '1' : '0';
            document.getElementById('broadcastHUD').style.opacity = opacity;
            document.getElementById('decisionHUD').style.opacity = opacity;
        }
    </script>
</body>
</html>
